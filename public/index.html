<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starluck</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>✨ Starluck</h1>

  <section id="authSection">
  <h2>Sign in</h2>
  <form id="magicLinkForm">
    <label for="authEmail">Email</label><br>
    <input id="authEmail" name="authEmail" type="email" required>
    <br><br>
    <button type="submit">Send magic link</button>
  </form>
  <p id="magicLinkStatus"></p>
</section>

  <section id="userSection" hidden>
    <p id="userEmail"></p>
    <button id="signOutButton" type="button">Sign out</button>
  </section>

  <form id="birthForm">

    <label for="name">Name</label><br>
    <input id="name" name="name" type="text" required>
    <br><br>

    <label for="birthDate">Birth Date</label><br>
    <input id="birthDate" name="birthDate" type="date" required>
    <br><br>

    <label for="birthTime">Birth Time</label><br>
    <input id="birthTime" name="birthTime" type="time" required>
    <br><br>

    <label for="birthPlace">Birth Place</label><br>
<input
  id="birthPlace"
  name="birthPlace"
  type="text"
  autocomplete="off"
  placeholder="Start typing your birth city..."
  required
>
<div id="placeSuggestions"></div>

<input id="latitude" type="hidden">
<input id="longitude" type="hidden">

<br><br>
    

    <button type="submit">
      Generate Chart
    </button>

  </form>
<script src="script.js"></script>
</body>
</html>
