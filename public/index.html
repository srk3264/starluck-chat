<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starluck</title>
</head>
<body>

  <h1>✨ Starluck</h1>

  <form id="birthForm">

    <label for="name">Name</label><br>
    <input id="name" name="name" type="text" required>
    <br><br>

    <label for="birthDate">Birth Date</label><br>
    <input id="birthDate" name="birthDate" type="date" required>
    <br><br>

    <label for="birthTime">Birth Time</label><br>
    <input id="birthTime" name="birthTime" type="time" required>
    <br><br>

    <label for="birthCity">Birth City</label><br>
    <input id="birthCity" name="birthCity" type="text" required>
    <br><br>

    <label for="birthCountry">Birth Country</label><br>
    <input id="birthCountry" name="birthCountry" type="text" required>
    <br><br>

    <button type="submit">
      Generate Chart
    </button>

  </form>

</body>
</html>
