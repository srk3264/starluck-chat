<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starluck</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>✨ Starluck</h1>

  <section id="authSection">
  <h2>Sign in</h2>
  <form id="magicLinkForm">
    <label for="authEmail">Email</label><br>
    <input id="authEmail" name="authEmail" type="email" required>
    <br><br>
    <button type="submit">Send magic link</button>
  </form>
  <p id="magicLinkStatus"></p>
</section>

  <section id="userSection" hidden>
    <p id="userEmail"></p>
    <button id="signOutButton" type="button">Sign out</button>
  </section>

  <form id="birthForm">

    <label for="name">Name</label><br>
    <input id="name" name="name" type="text" required>
    <br><br>

    <label for="birthDate">Birth Date</label><br>
    <input id="birthDate" name="birthDate" type="date" required>
    <br><br>

    <label for="birthTime">Birth Time</label><br>
    <input id="birthTime" name="birthTime" type="time" required>
    <br><br>

    <label for="birthCity">Birth City</label><br>
    <input id="birthCity" name="birthCity" type="text" required>
    <br><br>

    <label for="birthCountry">Birth Country</label><br>
    <input id="birthCountry" name="birthCountry" type="text" required>
    <br><br>
    <label for="latitude">Latitude</label><br>
<input id="latitude" name="latitude" type="number" step="any" required>
<br><br>

<label for="longitude">Longitude</label><br>
<input id="longitude" name="longitude" type="number" step="any" required>
<br><br>

    <button type="submit">
      Generate Chart
    </button>

  </form>
<script src="script.js"></script>
</body>
</html>
